name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tfm: [net10.0, net9.0, net8.0, netstandard2.0]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore src/OwlCore.Storage.NfsSharp.csproj

      - name: Build (${{ matrix.tfm }})
        run: dotnet build src/OwlCore.Storage.NfsSharp.csproj -c Release --no-restore --framework ${{ matrix.tfm }}
